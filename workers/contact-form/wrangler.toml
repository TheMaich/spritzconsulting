name = "spritz-contact-form"
main = "worker.js"
compatibility_date = "2026-07-01"

# Route the Worker on the production zone so the site can POST same origin.
# Adjust zone_name if the zone label differs in your Cloudflare account.
routes = [
  { pattern = "spritzconsulting.com/api/contact", zone_name = "spritzconsulting.com" },
  { pattern = "www.spritzconsulting.com/api/contact", zone_name = "spritzconsulting.com" }
]

# KV namespace holding submissions and rate-limit counters.
# Replace the id after running: wrangler kv namespace create CONTACT_SUBMISSIONS
[[kv_namespaces]]
binding = "CONTACT_SUBMISSIONS"
id = "REPLACE_WITH_NAMESPACE_ID"

# Notification email through Cloudflare Email Routing (free tier, no third
# party signup). REQUIRES, before `wrangler deploy` will succeed and mail
# will actually arrive:
#   1. Email Routing enabled on the spritzconsulting.com zone (adds MX + SPF).
#   2. michele@spritzconsulting.com verified as a destination address
#      (Cloudflare sends a confirmation email that must be clicked).
# The Worker now treats this binding as required: without it every submission
# returns 502 notification_failed instead of a silent 200, by design.
[[send_email]]
name = "NOTIFY"
destination_address = "michele@spritzconsulting.com"
