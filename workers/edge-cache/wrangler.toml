name = "spritz-edge-cache"
main = "worker.js"
compatibility_date = "2026-07-01"

# Fallback only. Prefer a Cloudflare cache rule (docs/cloudflare-html-cache.md).
# Do not deploy this alongside a cache rule covering the same paths.
#
# The route is deliberately zone wide: the Worker itself decides what is
# cacheable and passes everything else through untouched.
routes = [
  { pattern = "spritzconsulting.com/*", zone_name = "spritzconsulting.com" },
  { pattern = "www.spritzconsulting.com/*", zone_name = "spritzconsulting.com" }
]
